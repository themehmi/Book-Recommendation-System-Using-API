<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | The Reading Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="editorial-theme">
    <div class="texture-overlay"></div>
    
    <div class="page-container">
        <header class="site-header">
            <div class="brand">
                <h1 class="brand-title">Lumina.</h1>
                <span class="brand-subtitle">Curated Discoveries</span>
            </div>

            <div class="header-actions">
                <a href="https://github.com/themehmi/Book-Recommendation-System-Using-API/" target="_blank" class="source-link top-right">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                    <span>Source Code</span>
                </a>
            </div>

            <div class="progress-indicator hidden" id="progress-container">
                <span class="progress-text" id="progress-text">Inquiry 1 of 10</span>
                <div class="progress-bar-wrap">
                    <div class="progress-fill" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section id="start-section" class="content-section center-align">
                <div class="editorial-card">
                    <h2 class="headline-large">Find a Book<br>Worth Your Time.</h2>
                    <p class="body-text-large">A brief conversation to uncover the exact story you’re looking for right now.</p>
                    <button id="start-btn" class="primary-btn">Begin the Conversation</button>
                </div>
            </section>

            <section id="quiz-section" class="content-section hidden">
                <div class="inquiry-card">
                    <div class="section-label">Current Inquiry</div>
                    <h3 id="question-text" class="question-text">What mood are you looking for today?</h3>
                    <form id="quiz-form" class="response-form">
                        <div class="input-group">
                            <input type="text" id="answer-input" placeholder="Your thoughts..." required autocomplete="off">
                            <button type="submit" id="next-btn" class="icon-btn" aria-label="Next">
                                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="loading-section" class="content-section center-align hidden">
                <div class="loading-state">
                    <div class="elegant-spinner"></div>
                    <p class="loading-text">Consulting the archives...</p>
                </div>
            </section>

            <section id="results-section" class="content-section hidden">
                <div class="results-header">
                    <h2 class="headline-medium">Your Selected Collection</h2>
                </div>
                <div class="book-grid" id="books-grid"></div>
                <div class="results-footer">
                    <button id="restart-btn" class="secondary-btn">Start a New Search</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
